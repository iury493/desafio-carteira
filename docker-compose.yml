version: '3.8'

services:
  app:
    build: .
    container_name: carteira-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms128m
    volumes:
      - ./logs:/app/logs
    networks:
      - carteira-network
    restart: unless-stopped

networks:
  carteira-network:
    driver: bridge